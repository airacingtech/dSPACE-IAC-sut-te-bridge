name: AI Racing Tech  dSpace IAC sut-te-brige Docker

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - stable

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - SAVE_NAME: art_ros_iron_cpu_sut_te_bridge
            BASE_IMAGE: ros:iron-ros-base
            DOCKERFILE: Dockerfile 
    outputs:
      image_name: ${{ steps.save_image_name.outputs.image_name }}
      cache_name: ${{ steps.save_image_name.outputs.cache_name }}
      tag_name: ${{ steps.save_image_name.outputs.tag_name }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: airacingtechba
          password: ${{ secrets.PAT }}
